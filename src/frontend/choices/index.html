<html lang="en">
<head>

    <link href = "../general/style.css" rel = "stylesheet">

    <title>Choices SF64</title>
</head>
<body>
    <section id = "modal-cont">
        <div id = "close"></div>
        <form id = "new-store-form" method = "post">
            <label>Company name</label>
            <br>
            <input type = "text" name = "company" id = "icompany">
            <input type = "submit" name = "create-store" id = 'icreate' value = "CREATE">
            <p id = "err-msg"></p>
        </form>
    </section>
    <header>
        <div id = "logo-space">
            <div id = "logo">
            </div>
            <div id = "title">
                <h1>STORE FLOW 64</h1>
            </div>
        </div>
        <div id = "access-contact">
            <div id = "github" onclick = "go_to('https://github.com/ErickDevPereira/Store-Flow-64')">
                <div id = "github-simbol">
                </div>
                <p>source code</p>
            </div>
            <div id = "ld"  onclick = "go_to('https://www.linkedin.com/in/erick-dev-pereira/')">
                <div id = "ld-simbol">
                </div>
                <p>my Linkedin</p>
            </div>
    </header>
    <main>
        <div id = "btf-img">
            <div id = "presentation">
                <h1>Let the data drive your business</h1>
            </div>
        </div>
        <section id = "stores-place">
            <div class = "store" id = "adder">
                <h2>add a new store</h2>
                <div id = "shop-img"></div>
            </div>
        </section>
    </main>
    <!--If the .js file has import or export, I should use type = "module", otherwise, I don't need it-->
